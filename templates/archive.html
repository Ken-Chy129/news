<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} - 历史归档</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;800&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="newspaper">

  <header class="header">
    <div class="rule-heavy"></div>
    <h1 class="masthead">{{ title }}</h1>
    <div class="header-meta">历史归档 &middot; 共 {{ total }} 期</div>
    <div class="rule-heavy"></div>
  </header>

  <div class="archive-months">
    {% for month in months %}
    <details class="archive-month" {% if loop.first %}open{% endif %}>
      <summary class="archive-month-head">
        <span class="archive-month-name">{{ month.label }}</span>
        <span class="archive-month-count">{{ month.issues | length }} 期</span>
      </summary>
      <div class="archive-month-body">
        {% for issue in month.issues %}
        <a href="{{ issue.url }}" class="archive-item">
          <span class="archive-date">{{ issue.date }}</span>
          <span class="archive-count">{{ issue.count }} 条新闻</span>
        </a>
        {% endfor %}
      </div>
    </details>
    {% endfor %}
  </div>

  <footer class="footer">
    <div class="rule-light"></div>
    <p>{{ title }} &middot; 由 GitHub Actions 自动生成</p>
  </footer>

</div>
</body>
</html>
